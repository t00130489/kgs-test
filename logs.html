<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログ | kgs-test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      padding: 2rem;
    }
    h1 {
      color: #667eea;
      margin-bottom: 1rem;
      text-align: center;
    }
    .header-controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    .header-controls button {
      padding: 0.6rem 1.2rem;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.3s;
    }
    .header-controls button:hover {
      background: #764ba2;
    }
    .header-controls button.secondary {
      background: #e0e0e0;
      color: #333;
    }
    .header-controls button.secondary:hover {
      background: #d0d0d0;
    }
    .search-input {
      padding: 0.6rem 1rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      width: 200px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1.5rem;
      border-radius: 8px;
      text-align: center;
    }
    .stat-card h3 {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-bottom: 0.5rem;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: bold;
    }
    .logs-table-wrapper {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 2rem;
    }
    thead {
      background: #f5f7fa;
    }
    th {
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      color: #667eea;
      border-bottom: 2px solid #e0e0e0;
    }
    td {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid #f0f0f0;
    }
    tr:hover {
      background: #f9f9f9;
    }
    .room-id {
      font-weight: 600;
      color: #667eea;
    }
    .participants {
      font-size: 0.9rem;
      color: #666;
    }
    .winner {
      background: #fff8e1;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      font-weight: 600;
      color: #f57c00;
    }
    .mode {
      display: inline-block;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .mode.input {
      background: #c8e6c9;
      color: #2e7d32;
    }
    .mode.select {
      background: #bbdefb;
      color: #1565c0;
    }
    .timestamp {
      font-size: 0.85rem;
      color: #999;
    }
    .empty-state, .loading-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #999;
    }
    .empty-state h2, .loading-state h2 {
      margin-bottom: 1rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .expand-btn {
      background: none;
      border: none;
      color: #667eea;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0;
    }
    .details-row {
      display: none;
    }
    .details-row.show {
      display: table-row;
    }
    .details-cell {
      padding: 1rem;
      background: #f9f9f9;
    }
    .details-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    th.sortable {
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    th.sortable:hover {
      background: #e8ebf0;
    }
    .sort-icon {
      font-size: 0.8rem;
      margin-left: 0.2rem;
      color: #999;
    }
    th.sortable.active .sort-icon {
      color: #667eea;
    }
    @media (max-width: 768px) {
      .details-content {
        grid-template-columns: 1fr;
      }
      .container {
        padding: 1rem;
      }
      .header-controls {
        flex-direction: column;
      }
      .search-input {
        width: 100%;
      }
      table {
        font-size: 0.85rem;
      }
      th, td {
        padding: 0.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 ゲームログ</h1>
    
    <div class="header-controls">
      <input type="text" class="search-input" id="searchInput" placeholder="ルームID または プレイヤー名で検索">
      <input type="date" class="search-input" id="startDate" title="開始日">
      <span>〜</span>
      <input type="date" class="search-input" id="endDate" title="終了日">
      <button class="secondary" id="exportBtn">📥 CSV エクスポート</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="logs-table-wrapper">
      <table id="logsTable" style="display: none;">
        <thead>
          <tr>
            <th></th>
            <th class="sortable active" data-sort="date">日時 <span class="sort-icon">▼</span></th>
            <th class="sortable" data-sort="roomId">ルームID <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="host">ホスト <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="participantsCount">参加人数 <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="winner">優勝者 <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="questions">問題数 <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="mode">形式 <span class="sort-icon"></span></th>
            <th class="sortable" data-sort="status">ステータス <span class="sort-icon"></span></th>
          </tr>
        </thead>
        <tbody id="logsBody"></tbody>
      </table>
    </div>

    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <h2>ゲームログを読み込んでいます...</h2>
    </div>

    <div class="empty-state" id="emptyState" style="display: none;">
      <h2>ゲームログがまだ記録されていません</h2>
      <p>ゲームをはじめてみましょう！</p>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById('searchInput');
    const startDateInput = document.getElementById('startDate');
    const endDateInput = document.getElementById('endDate');
    const exportBtn = document.getElementById('exportBtn');
    const statsDiv = document.getElementById('stats');
    const logsTable = document.getElementById('logsTable');
    const logsBody = document.getElementById('logsBody');
    const emptyState = document.getElementById('emptyState');
    const loadingState = document.getElementById('loadingState');
    
    let currentSort = { key: 'date', order: 'desc' };

    // API からゲームログを取得
    async function fetchLogs() {
      try {
        const response = await fetch('https://us-central1-kgs-test-68924.cloudfunctions.net/getGameLogs?limit=100');
        if (!response.ok) throw new Error('Failed to fetch logs');
        const data = await response.json();
        return data.logs || [];
      } catch (e) {
        console.error('Error fetching logs:', e);
        return [];
      }
    }

    // テーブルを再描画
    function renderTable(logs) {
      logsBody.innerHTML = '';
      loadingState.style.display = 'none';

      if (logs.length === 0) {
        logsTable.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      logsTable.style.display = 'table';
      emptyState.style.display = 'none';
      logs.forEach((log, index) => {
        const date = new Date(log.createdAt || log.finishedAt);
        const timeStr = date.toLocaleString('ja-JP');
        const winners = log.winners || [];
        const participantsCount = log.participants ? log.participants.length : 0;
        const hostName = log.host || (log.participants && log.participants.length > 0 ? log.participants[0] : '-');
        
        let statusBadge = '';
        let statusText = '完了';
        if (log.status === 'incomplete') {
          statusText = '途中終了';
          statusBadge = '<span style="background: #ffcccc; color: #c00; padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.85rem; font-weight: 600;">途中終了</span>';
        } else if (log.status === 'in-progress') {
          statusText = '進行中';
          statusBadge = '<span style="background: #e3f2fd; color: #1976d2; padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.85rem; font-weight: 600;">進行中</span>';
        } else {
          statusText = '終了';
          statusBadge = '<span style="background: #c8e6c9; color: #2e7d32; padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.85rem; font-weight: 600;">終了</span>';
        }

        const isUnfinished = log.status === 'incomplete' || log.status === 'in-progress';

        // メインの行
        const mainRow = document.createElement('tr');
        mainRow.innerHTML = `
          <td><button class="expand-btn" data-index="${index}">▼</button></td>
          <td class="timestamp">${timeStr}</td>
          <td class="room-id">${log.roomId}</td>
          <td>${hostName}</td>
          <td>${participantsCount}人</td>
          <td><span class="winner">${isUnfinished ? 'ー' : (winners.join(', ') || 'なし')}</span></td>
          <td>${log.questionsCount}</td>
          <td><span class="mode ${log.mode}">${log.mode === 'select' ? '選択' : '入力'}</span></td>
          <td>${statusBadge}</td>
        `;

        // 詳細情報の行
        const detailsRow = document.createElement('tr');
        detailsRow.className = 'details-row';
        detailsRow.innerHTML = `
          <td colspan="9">
            <div class="details-cell">
              <div class="details-content">
                <div>
                  <h4>参加者</h4>
                  <p>${log.participants?.join(', ') || '-'}</p>
                </div>
                <div>
                  <h4>ゲーム情報</h4>
                  <p><strong>範囲:</strong> ${log.chapters?.join(', ') || '-'}</p>
                  <p><strong>問題数:</strong> ${log.questionsCount}問</p>
                  <p><strong>開始:</strong> ${new Date(log.createdAt).toLocaleString('ja-JP')}</p>
                  <p><strong>ステータス:</strong> <span style="font-weight: 600;">${statusText}</span></p>
                </div>
              </div>
            </div>
          </td>
        `;

        logsBody.appendChild(mainRow);
        logsBody.appendChild(detailsRow);

        // 展開・折畳みイベント
        mainRow.querySelector('.expand-btn').addEventListener('click', (e) => {
          e.preventDefault();
          detailsRow.classList.toggle('show');
        });
      });
    }

    // 統計情報を表示
    function renderStats(logs) {
      if (logs.length === 0) {
        statsDiv.innerHTML = '';
        return;
      }

      const totalGames = logs.length;
      const totalPlayers = new Set();
      const totalWinners = new Set();
      let totalQuestions = 0;

      logs.forEach(log => {
        log.participants?.forEach(p => totalPlayers.add(p));
        log.winners?.forEach(w => totalWinners.add(w));
        totalQuestions += log.questionsCount || 0;
      });

      statsDiv.innerHTML = `
        <div class="stat-card">
          <h3>ゲーム数</h3>
          <div class="value">${totalGames}</div>
        </div>
        <div class="stat-card">
          <h3>参加者</h3>
          <div class="value">${totalPlayers.size}</div>
        </div>
        <div class="stat-card">
          <h3>優勝者</h3>
          <div class="value">${totalWinners.size}</div>
        </div>
        <div class="stat-card">
          <h3>総出題数</h3>
          <div class="value">${totalQuestions}</div>
        </div>
      `;
    }

    // 検索・日付フィルタ
    function filterLogs(query, startDate, endDate, logs) {
      let filtered = logs;

      if (startDate) {
        const start = new Date(startDate).setHours(0, 0, 0, 0);
        filtered = filtered.filter(log => (log.createdAt || log.finishedAt) >= start);
      }
      if (endDate) {
        const end = new Date(endDate).setHours(23, 59, 59, 999);
        filtered = filtered.filter(log => (log.createdAt || log.finishedAt) <= end);
      }

      if (query) {
        const q = query.toLowerCase();
        filtered = filtered.filter(log =>
          log.roomId.toLowerCase().includes(q) ||
          (log.host && log.host.toLowerCase().includes(q)) ||
          log.participants?.some(p => p.toLowerCase().includes(q)) ||
          log.winners?.some(w => w.toLowerCase().includes(q)) ||
          (log.status && log.status.toLowerCase().includes(q))
        );
      }

      return filtered;
    }

    // ソート
    function sortLogs(logs, sortKey, sortOrder) {
      return [...logs].sort((a, b) => {
        let valA, valB;

        switch (sortKey) {
          case 'date':
            valA = a.createdAt || a.finishedAt; valB = b.createdAt || b.finishedAt; break;
          case 'roomId':
            valA = a.roomId; valB = b.roomId; break;
          case 'host':
            valA = a.host || (a.participants && a.participants.length > 0 ? a.participants[0] : '');
            valB = b.host || (b.participants && b.participants.length > 0 ? b.participants[0] : ''); break;
          case 'participantsCount':
            valA = a.participants ? a.participants.length : 0;
            valB = b.participants ? b.participants.length : 0; break;
          case 'winner':
            valA = a.winners ? a.winners.join(',') : '';
            valB = b.winners ? b.winners.join(',') : ''; break;
          case 'questions':
            valA = a.questionsCount || 0; valB = b.questionsCount || 0; break;
          case 'mode':
            valA = a.mode; valB = b.mode; break;
          case 'status':
            valA = a.status || ''; valB = b.status || ''; break;
          default:
            return 0;
        }

        if (valA < valB) return sortOrder === 'asc' ? -1 : 1;
        if (valA > valB) return sortOrder === 'asc' ? 1 : -1;
        return 0;
      });
    }

    let currentLogs = [];

    // 表示更新
    function updateView() {
      const filtered = filterLogs(searchInput.value, startDateInput.value, endDateInput.value, currentLogs);
      const sorted = sortLogs(filtered, currentSort.key, currentSort.order);
      renderTable(sorted);
      renderStats(sorted);
    }

    searchInput.addEventListener('input', updateView);
    startDateInput.addEventListener('change', updateView);
    endDateInput.addEventListener('change', updateView);

    // ソートイベント
    document.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const sortKey = th.dataset.sort;
        if (currentSort.key === sortKey) {
          currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
        } else {
          currentSort.key = sortKey;
          currentSort.order = 'desc';
        }
        
        document.querySelectorAll('th.sortable').forEach(el => {
          el.classList.remove('active');
          el.querySelector('.sort-icon').textContent = '';
        });
        th.classList.add('active');
        th.querySelector('.sort-icon').textContent = currentSort.order === 'asc' ? '▲' : '▼';

        updateView();
      });
    });

    // CSV エクスポート
    exportBtn.addEventListener('click', () => {
      const filtered = filterLogs(searchInput.value, startDateInput.value, endDateInput.value, currentLogs);
      const sorted = sortLogs(filtered, currentSort.key, currentSort.order);
      
      if (sorted.length === 0) {
        alert('エクスポートするログがありません');
        return;
      }

      const headers = ['日時', 'ルームID', 'ホスト', '参加人数', '優勝者', '問題数', '形式', 'ステータス'];
      const rows = sorted.map(log => {
        const date = new Date(log.createdAt || log.finishedAt).toLocaleString('ja-JP');
        const participantsCount = log.participants ? log.participants.length : 0;
        const hostName = log.host || (log.participants && log.participants.length > 0 ? log.participants[0] : '-');
        let statusText = '終了';
        if (log.status === 'incomplete') statusText = '途中終了';
        else if (log.status === 'in-progress') statusText = '進行中';

        return [
          date,
          log.roomId,
          hostName,
          participantsCount,
          log.status === 'finished' ? (log.winners?.join('; ') || '') : '',
          log.questionsCount,
          log.mode === 'select' ? '選択' : '入力',
          statusText
        ];
      });

      const csv = [headers, ...rows]
        .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
        .join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `game-logs-${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    });

    // 初期表示
    async function init() {
      const logs = await fetchLogs();
      currentLogs = logs;
      updateView();
    }
    init();
  </script>
</body>
</html>
